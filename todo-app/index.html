<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Todo | Firebase</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>
    
    <main class="todo-container glass">
        <header>
            <h1 class="gradient-text">Vibe Todo</h1>
            <p>Code with your vibe. Firebase real-time sync.</p>
        </header>

        <form id="todo-form" class="input-group">
            <input type="text" id="todo-input" placeholder="오늘 할 일은 무엇인가요?" required autocomplete="off">
            <button type="submit" class="btn btn-primary" id="add-btn">Add ⚡</button>
        </form>

        <div class="todo-list-wrapper">
            <ul id="todo-list" class="todo-list">
                <!-- 할 일 아이템이 여기에 동적으로 추가됩니다 -->
                <li class="loading-state">데이터를 불러오는 중입니다...</li>
            </ul>
        </div>
    </main>

    <!-- type="module" is critical for Firebase CDN imports -->
    <script type="module" src="main.js"></script>
</body>
</html>
